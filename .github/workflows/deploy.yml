# ──────────────────────────────────────────────────────────────────────────────
# Deploy to DonWeb/Ferozo via FTP
#
# Architecture:
#   versuspadel.ar        → /public_html/          (React SPA)
#   api.versuspadel.ar    → /public_html/api/       (WordPress + WooCommerce)
#   /public_html/backend/ → PHP proxy for admin ops
#
# Required GitHub Secrets:
#   FTP_SERVER              → l0100520.ferozo.com
#   FTP_USERNAME            → l0100520
#   FTP_PASSWORD            → FTP password
#   VITE_WC_URL             → https://api.versuspadel.ar (or versuspadel.ar/api)
#   VITE_WC_CONSUMER_KEY    → ck_xxxx  (WooCommerce > Settings > Advanced > REST API)
#   VITE_WC_CONSUMER_SECRET → cs_xxxx  (WooCommerce > Settings > Advanced > REST API)
#   ADMIN_PASSWORD          → password for /admin panel  (e.g. Padel2026)
#   WP_USERNAME             → WordPress admin username   (for media uploads)
#   WP_APP_PASSWORD         → WordPress Application Password (Users > Profile > App Passwords)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to DonWeb

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_WC_URL: ${{ secrets.VITE_WC_URL }}
          VITE_WC_CONSUMER_KEY: ${{ secrets.VITE_WC_CONSUMER_KEY }}
          VITE_WC_CONSUMER_SECRET: ${{ secrets.VITE_WC_CONSUMER_SECRET }}

      - name: Copy PHP backend files to dist
        run: |
          mkdir -p dist/backend
          cp backend/*.php dist/backend/
          cp backend/.htaccess dist/backend/

      - name: Generate config.php from secrets
        run: |
          cat > dist/backend/config.php << 'PHPEOF'
          <?php
          // Auto-generated by GitHub Actions — DO NOT EDIT MANUALLY
          define('FRONTEND_URL',       'https://versuspadel.ar');
          define('WC_URL',             '${{ secrets.VITE_WC_URL }}');
          define('WC_CONSUMER_KEY',    '${{ secrets.VITE_WC_CONSUMER_KEY }}');
          define('WC_CONSUMER_SECRET', '${{ secrets.VITE_WC_CONSUMER_SECRET }}');
          define('WP_USERNAME',        '${{ secrets.WP_USERNAME }}');
          define('WP_APP_PASSWORD',    '${{ secrets.WP_APP_PASSWORD }}');
          define('ADMIN_PASSWORD',     '${{ secrets.ADMIN_PASSWORD }}');
          define('TOKEN_MAX_AGE',      86400);
          PHPEOF
          echo "✅ config.php generated"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Ferozo via FTP
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" ${{ secrets.FTP_SERVER }} <<'LFTP_EOF'
          set ftp:ssl-allow no
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 1
          set mirror:parallel-transfer-count 2
          mirror --reverse --verbose --ignore-time \
            --exclude ^api/ \
            --exclude ^api\.versuspadel\.ar \
            --exclude ^wp- \
            --exclude ^wp-admin/ \
            --exclude ^wp-content/ \
            --exclude ^wp-includes/ \
            --exclude ^cgi-bin/ \
            --exclude \.htaccess\.bk$ \
            --exclude ^wp-config\.php$ \
            --exclude ^wp-config-sample\.php$ \
            --exclude ^xmlrpc\.php$ \
            --exclude ^readme\.html$ \
            --exclude ^licencia\.txt$ \
            --exclude ^license\.txt$ \
            --exclude ^index\.php$ \
            ./dist/ /public_html/
          bye
          LFTP_EOF
          echo "✅ Deploy complete!"
