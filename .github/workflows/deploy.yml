# ──────────────────────────────────────────────────────────
# GitHub Actions: Deploy to DonWeb/Ferozo via FTP
#
# Triggers on every push to `main`.
# 1. Installs dependencies & builds the React app
# 2. Uploads the built files (dist/) + PHP backend to Ferozo via FTP
#
# Architecture:
#   versuspadel.ar       → /public_html/ (React SPA)
#   api.versuspadel.ar   → /public_html/api/ (WordPress + WooCommerce)
# ──────────────────────────────────────────────────────────

name: Deploy to DonWeb

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_WC_STORE_URL: https://versuspadel.ar/api

      - name: Copy PHP backend files to dist
        run: |
          mkdir -p dist/backend
          cp backend/*.php dist/backend/
          cp backend/.htaccess dist/backend/

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Ferozo via FTP
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" ${{ secrets.FTP_SERVER }} <<EOF
          set ftp:ssl-allow no
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 1
          set mirror:parallel-transfer-count 2
          mirror --reverse --verbose --ignore-time \
            --exclude ^api/ \
            --exclude ^wp- \
            --exclude ^cgi-bin/ \
            --exclude ^css/ \
            --exclude ^img/ \
            --exclude ^logos/ \
            --exclude \.htpasswd \
            --exclude index\.php \
            --exclude xmlrpc\.php \
            --exclude readme\.html \
            --exclude licencia\.txt \
            --exclude license\.txt \
            --exclude \.htaccess\.bk \
            --exclude wp-config\.php \
            --exclude wp-config-sample\.php \
            ./dist/ /public_html/
          bye
          EOF
          echo "Deploy complete!"
