# ──────────────────────────────────────────────────────────
# GitHub Actions: Deploy to DonWeb/Ferozo via FTP
#
# Triggers on every push to `main`.
# 1. Installs dependencies & builds the React app
# 2. Uploads the built files (dist/) + PHP backend to Ferozo via FTP
#
# Required GitHub Secrets:
#   FTP_SERVER   → e.g. l0100520.ferozo.com
#   FTP_USERNAME → e.g. l0100520
#   FTP_PASSWORD → your FTP password
#
# Architecture:
#   versuspadel.ar       → /public_html/ (React SPA)
#   api.versuspadel.ar   → /public_html/api/ (WordPress + WooCommerce)
# ──────────────────────────────────────────────────────────

name: Deploy to DonWeb

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_WC_STORE_URL: https://api.versuspadel.ar

      - name: Copy PHP backend files to dist
        run: |
          mkdir -p dist/backend
          cp backend/*.php dist/backend/
          cp backend/.htaccess dist/backend/

      - name: Deploy to Ferozo via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/api/**
            **/wp-*
            **/wp-content/**
            **/wp-includes/**
            **/wp-admin/**
            **/cgi-bin/**
